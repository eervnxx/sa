<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>البوابة السرية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }

        /* الشاشات */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease;
        }

        /* شاشة الدخول المظلمة */
        .dark-screen {
            background: #000;
            z-index: 1000;
        }

        .dark-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        .glitch-title {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            font-weight: 900;
            color: #ff0000;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            margin-bottom: 40px;
            animation: glitch 2s infinite;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        @keyframes glitch {
            0%, 100% { transform: skew(0deg); opacity: 1; }
            95% { transform: skew(2deg); opacity: 0.9; }
            96% { transform: skew(-2deg); opacity: 0.8; }
            97% { transform: skew(3deg); opacity: 0.9; }
            98% { transform: skew(-3deg); opacity: 0.8; }
        }

        .code-box {
            background: rgba(20, 0, 0, 0.7);
            border: 2px solid #ff0000;
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        .inputs-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            direction: ltr;
            flex-wrap: wrap;
        }

        .code-input {
            width: min(100px, 25%);
            aspect-ratio: 1/1;
            background: #1a0000;
            border: 2px solid #ff3333;
            color: #ff6666;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: bold;
            text-align: center;
            border-radius: 10px;
            outline: none;
            box-shadow: 0 0 15px #ff0000;
        }

        .code-input:focus {
            border-color: #ff0000;
            box-shadow: 0 0 30px #ff0000;
            background: #2a0000;
        }

        .error-msg {
            color: #ff0000;
            margin: 20px 0 10px;
            font-size: clamp(1rem, 4vw, 1.2rem);
            min-height: 40px;
            font-weight: 600;
            text-shadow: 0 0 5px #ff0000;
        }

        .warning {
            color: #660000;
            font-size: 0.9rem;
            margin-top: 20px;
        }

        /* شاشة العالم الوردي */
        .pink-screen {
            background: linear-gradient(135deg, #ffc0cb, #ffb6c1, #ff9eb5);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .pink-screen.visible {
            opacity: 1;
            pointer-events: all;
        }

        /* العناصر العائمة */
        .floating-items {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .float-item {
            position: absolute;
            font-size: clamp(1.2rem, 4vw, 2rem);
            animation: floatAround 6s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -20px) rotate(10deg); }
            50% { transform: translate(-10px, -30px) rotate(-5deg); }
            75% { transform: translate(-20px, 10px) rotate(5deg); }
        }

        /* المحتوى الرئيسي */
        .main-content {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .gift-box {
            width: min(250px, 60vw);
            height: min(250px, 60vw);
            margin: 0 auto 20px;
            background: linear-gradient(145deg, #ff3b6f, #ff69b4);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 20, 100, 0.5), 0 0 50px #ff99cc;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(80px, 20vw);
            transition: transform 0.3s;
            border: 3px solid white;
        }

        .gift-box:active {
            transform: scale(0.95);
        }

        .gift-box.exploded {
            animation: explode 0.6s forwards;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.5; }
            100% { transform: scale(0); opacity: 0; }
        }

        .open-button {
            background: #ff3b6f;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 5px 0 #b32d5a, 0 10px 20px #ff99cc;
            cursor: pointer;
            border: 2px dashed white;
            width: fit-content;
            margin: 0 auto;
        }

        .open-button:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #b32d5a, 0 10px 20px #ff99cc;
        }

        .name-section {
            margin-top: 40px;
            opacity: 0;
            transition: opacity 0.8s;
        }

        .name-section.show {
            opacity: 1;
        }

        .girl-name {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            color: white;
            text-shadow: 0 0 20px #ff3b6f, 0 0 40px #ff69b4;
            animation: nameGlow 2s infinite;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        @keyframes nameGlow {
            0%, 100% { text-shadow: 0 0 20px #ff3b6f, 0 0 40px #ff69b4; }
            50% { text-shadow: 0 0 40px #ff69b4, 0 0 80px #ffb6c1; }
        }

        .love-text {
            font-size: clamp(1.2rem, 5vw, 2rem);
            color: white;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid white;
        }

        .hidden {
            display: none !important;
        }

        /* تأثير الاهتزاز */
        .shake {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-5px); }
        }
    </style>
</head>
<body>

    <!-- شاشة الدخول المظلمة -->
    <div class="screen dark-screen" id="darkScreen">
        <div class="login-container">
            <div class="glitch-title">ACCESS DENIED</div>
            <div class="code-box">
                <div class="inputs-row">
                    <input type="text" class="code-input" id="year" maxlength="4" placeholder="****" inputmode="numeric">
                    <input type="text" class="code-input" id="month" maxlength="2" placeholder="**" inputmode="numeric">
                    <input type="text" class="code-input" id="day" maxlength="2" placeholder="**" inputmode="numeric">
                </div>
                <div class="error-msg" id="errorMsg"></div>
                <div class="warning">⚠️ SYSTEM LOCKED ⚠️</div>
            </div>
        </div>
    </div>

    <!-- الشاشة الوردية -->
    <div class="screen pink-screen" id="pinkScreen">
        <!-- عناصر عائمة -->
        <div class="floating-items" id="floatingContainer"></div>

        <!-- المحتوى الرئيسي -->
        <div class="main-content">
            <div class="gift-box" id="giftBox">🎁</div>
            <button class="open-button" id="openBtn">اضغط لكسر الصندوق</button>

            <div class="name-section" id="nameSection">
                <div class="girl-name" id="girlName">ملاك</div>
                <div class="love-text" id="loveMessage">💖 شكراً ملاك 💖</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // الثوابت
            const SECRET = {
                year: '2009',
                month: '11',
                day: '20'
            };
            
            // العناصر
            const darkScreen = document.getElementById('darkScreen');
            const pinkScreen = document.getElementById('pinkScreen');
            const yearInput = document.getElementById('year');
            const monthInput = document.getElementById('month');
            const dayInput = document.getElementById('day');
            const errorMsg = document.getElementById('errorMsg');
            const giftBox = document.getElementById('giftBox');
            const openBtn = document.getElementById('openBtn');
            const nameSection = document.getElementById('nameSection');
            const floatingContainer = document.getElementById('floatingContainer');

            // عناصر عائمة
            const symbols = ['🎈', '🌸', '🌹', '💐', '✨', '💕', '💗', '🎀', '🫧', '🎊'];
            
            function createFloatItem() {
                const item = document.createElement('div');
                item.className = 'float-item';
                item.textContent = symbols[Math.floor(Math.random() * symbols.length)];
                item.style.left = Math.random() * 100 + '%';
                item.style.top = Math.random() * 100 + '%';
                item.style.animationDelay = Math.random() * 5 + 's';
                item.style.fontSize = (Math.random() * 30 + 20) + 'px';
                floatingContainer.appendChild(item);
                
                setTimeout(() => item.remove(), 8000);
            }

            // بدء العناصر العائمة عند ظهور الشاشة الوردية
            let floatInterval;
            
            function startFloatingItems() {
                if (floatInterval) clearInterval(floatInterval);
                // إنشاء عدة عناصر فوراً
                for (let i = 0; i < 15; i++) {
                    setTimeout(createFloatItem, i * 100);
                }
                // استمرار الإنشاء
                floatInterval = setInterval(createFloatItem, 400);
            }

            function stopFloatingItems() {
                if (floatInterval) {
                    clearInterval(floatInterval);
                    floatInterval = null;
                }
            }

            // التحقق من الرمز
            function checkCode() {
                const year = yearInput.value.trim();
                const month = monthInput.value.trim();
                const day = dayInput.value.trim();

                if (year === SECRET.year && month === SECRET.month && day === SECRET.day) {
                    // رمز صحيح
                    errorMsg.textContent = '';
                    darkScreen.classList.add('hidden');
                    pinkScreen.classList.add('visible');
                    startFloatingItems();
                    
                    // إفراغ الحقول
                    yearInput.value = '';
                    monthInput.value = '';
                    dayInput.value = '';
                } else {
                    // رمز خطأ
                    errorMsg.textContent = '❌ رمز خطأ ❌';
                    document.querySelector('.code-box').classList.add('shake');
                    setTimeout(() => {
                        document.querySelector('.code-box').classList.remove('shake');
                    }, 300);
                    
                    // إفراغ الحقول
                    yearInput.value = '';
                    monthInput.value = '';
                    dayInput.value = '';
                    yearInput.focus();
                }
            }

            // التنقل التلقائي
            yearInput.addEventListener('input', function() {
                if (this.value.length === 4) monthInput.focus();
            });
            
            monthInput.addEventListener('input', function() {
                if (this.value.length === 2) dayInput.focus();
            });
            
            dayInput.addEventListener('input', function() {
                if (this.value.length === 2) checkCode();
            });

            // Enter في أي حقل
            [yearInput, monthInput, dayInput].forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') checkCode();
                });
            });

            // منع إدخال غير الأرقام
            [yearInput, monthInput, dayInput].forEach(input => {
                input.addEventListener('keydown', (e) => {
                    if (!/^\d$/.test(e.key) && e.key !== 'Backspace' && e.key !== 'Tab' && e.key !== 'Enter' && e.key !== 'Delete' && e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') {
                        e.preventDefault();
                    }
                });
            });

            // تفجير الصندوق
            function explodeGift() {
                if (giftBox.classList.contains('exploded')) return;
                
                giftBox.classList.add('exploded');
                openBtn.style.opacity = '0.5';
                openBtn.style.pointerEvents = 'none';
                
                // إنشاء انفجار من العناصر
                for (let i = 0; i < 40; i++) {
                    setTimeout(createFloatItem, i * 20);
                }
                
                setTimeout(() => {
                    giftBox.style.display = 'none';
                    openBtn.style.display = 'none';
                    nameSection.classList.add('show');
                }, 600);
            }

            giftBox.addEventListener('click', explodeGift);
            openBtn.addEventListener('click', explodeGift);

            // تنظيف عند إخفاء الشاشة
            const observer = new MutationObserver((mutations) => {
                mutations.forEach((mutation) => {
                    if (mutation.attributeName === 'class') {
                        if (!pinkScreen.classList.contains('visible')) {
                            stopFloatingItems();
                            // إعادة تعيين العناصر
                            giftBox.style.display = 'flex';
                            openBtn.style.display = 'inline-block';
                            giftBox.classList.remove('exploded');
                            openBtn.style.opacity = '1';
                            openBtn.style.pointerEvents = 'auto';
                            nameSection.classList.remove('show');
                        }
                    }
                });
            });

            observer.observe(pinkScreen, { attributes: true });

            // بدء التركيز على أول حقل
            yearInput.focus();
        })();
    </script>
</body>
</html>
