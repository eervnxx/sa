<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ساره — صندوق الذكريات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            min-height: 100vh;
            width: 100%;
            position: relative;
            overflow-x: hidden;
        }

        /* ========== شاشة الدخول الأولى (دارك ويب) ========== */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, #0b0c0e, #030303);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.9s cubic-bezier(0.76, 0.05, 0.24, 1);
            backdrop-filter: blur(2px);
        }

        .login-card {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid #2a1f1f;
            border-radius: 42px 12px 42px 12px;
            padding: 2.8rem 2.5rem;
            width: 400px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px #3d1e1e inset, 0 0 20px #ff004040;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(0deg, transparent, transparent 7px, rgba(255, 0, 60, 0.03) 7px, rgba(255, 0, 0, 0.05) 10px);
            animation: scan 14s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(30%) rotate(2deg); }
        }

        .login-card h2 {
            color: #ebb3b3;
            font-weight: 700;
            letter-spacing: 4px;
            text-shadow: 0 0 8px crimson, 0 0 20px red;
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 2px dashed #6b2d2d;
            padding-bottom: 15px;
        }

        .secret-label {
            color: #ad6d6d;
            font-size: 1.1rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: #130b0b;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #7a2929;
        }

        .date-inputs {
            display: flex;
            gap: 10px;
            direction: ltr;
            margin: 30px 0;
            justify-content: center;
        }

        .date-inputs input {
            width: 85px;
            background: #1a0c0c;
            border: 1px solid #aa4a4a;
            color: #ffc0c0;
            font-size: 1.7rem;
            font-weight: 900;
            text-align: center;
            padding: 12px 0;
            border-radius: 18px;
            box-shadow: inset 0 0 15px #330000, 0 0 10px #ff4d4d;
            transition: 0.2s;
        }

        .date-inputs input:focus {
            outline: none;
            border-color: #ff8585;
            box-shadow: 0 0 30px red;
        }

        .secret-hint {
            color: #5f4b4b;
            font-size: 0.85rem;
            margin: 5px 0 20px;
            letter-spacing: 1px;
        }

        .glitch-btn {
            background: #1f0f0f;
            border: 3px solid #8b2a2a;
            color: #ffbebe;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border-radius: 40px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            transition: 0.3s;
            box-shadow: 0 0 30px #b30000, 0 5px 0 #380000;
            margin-top: 10px;
            position: relative;
        }

        .glitch-btn:hover {
            background: #3d1818;
            box-shadow: 0 0 60px red, 0 3px 0 #5a0000;
            transform: translateY(-2px);
            color: white;
        }

        /* ========== الصفحة الرئيسية ========== */
        .main-party {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffc0cb 0%, #ffb6c1 30%, #ff99aa 70%, #ff5977 100%);
            background-attachment: fixed;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            animation: softGlow 4s infinite alternate;
        }

        @keyframes softGlow {
            0% { box-shadow: inset 0 0 50px #ff99aa; }
            100% { box-shadow: inset 0 0 120px #ff3b6f; }
        }

        .bubble-bg, .flower-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            box-shadow: inset -5px -5px 15px rgba(255, 90, 120, 0.6), 0 0 30px #ffa5b0;
            backdrop-filter: blur(2px);
            animation: floatUp 8s infinite ease-in-out;
        }

        .flower {
            position: absolute;
            color: #ffebf0;
            font-size: 2.2rem;
            filter: drop-shadow(0 0 8px #ff3b6f);
            animation: spinFlower 14s infinite alternate;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.3); opacity: 0.5; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        @keyframes spinFlower {
            0% { transform: rotate(0deg) translateX(20px); }
            100% { transform: rotate(360deg) translateX(-30px); }
        }

        .box-container {
            position: relative;
            z-index: 30;
            text-align: center;
            width: 100%;
            max-width: 550px;
            margin: 20px;
        }

        .gift-box {
            background: radial-gradient(circle at 30% 20%, #ff3a5e, #a1163a);
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border-radius: 40px 40px 70px 70px;
            box-shadow: 0 30px 0 #5c1024, 0 40px 40px rgba(0, 0, 0, 0.5), 0 0 0 8px #ffccd5, 0 0 0 12px #ff889f;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid #fff2f2;
        }

        .gift-box::before {
            content: "🎀";
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            filter: drop-shadow(0 10px 8px #97002b);
        }

        .gift-box span {
            font-size: 2rem;
            color: white;
            font-weight: 900;
            text-shadow: 0 0 20px darkred;
            background: rgba(0,0,0,0.2);
            padding: 10px 25px;
            border-radius: 50px;
            border: 2px dashed white;
        }

        .hole-button {
            background: #ffc2c9;
            border: 6px double #ff1a4c;
            color: #a10022;
            font-size: 2rem;
            font-weight: 900;
            padding: 18px 45px;
            border-radius: 80px 20px 80px 20px;
            cursor: pointer;
            box-shadow: 0 20px 0 #a12342, 0 25px 25px #69001e;
            transition: 0.15s linear;
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            z-index: 40;
            margin-top: 10px;
            display: inline-block;
            transform: rotate(-1deg);
            word-break: keep-all;
        }

        .hole-button:active {
            transform: translateY(15px) rotate(-1deg);
            box-shadow: 0 5px 0 #a12342, 0 15px 25px #3a0011;
        }

        .sarah-name {
            font-size: 0;
            color: #ffecf0;
            text-shadow: 0 0 30px #ffbbcc, 0 0 70px red;
            font-weight: 900;
            margin-top: 40px;
            transition: font-size 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 50;
            line-height: 1.4;
            word-break: keep-all;
            text-align: center;
            width: 100%;
        }

        .sarah-name.show {
            font-size: 7vw;
        }

        @media (min-width: 700px) {
            .sarah-name.show { font-size: 5rem; }
        }

        .confetti-piece {
            position: absolute;
            width: 15px;
            height: 25px;
            background: #ffd966;
            top: 0;
            opacity: 0.8;
            z-index: 999;
            animation: dropConfetti 2s linear forwards;
            border-radius: 0 50% 0 50%;
        }

        @keyframes dropConfetti {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(540deg); opacity: 0.4; }
        }

        .footer-love {
            margin-top: 30px;
            font-size: 1.4rem;
            color: #72002b;
            text-shadow: 0 0 20px white;
            font-weight: bold;
            z-index: 50;
            background: rgba(255, 220, 230, 0.7);
            padding: 10px 30px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

<!-- شاشة الدخول - التاريخ سري لا يظهر -->
<div class="login-screen" id="loginScreen">
    <div class="login-card">
        <h2>✦ المدخل السري ✦</h2>
        <div class="secret-label">أدخل التاريخ المنسي</div>
        <div class="date-inputs">
            <input type="text" id="year" maxlength="4" placeholder="سنة">
            <input type="text" id="month" maxlength="2" placeholder="شهر">
            <input type="text" id="day" maxlength="2" placeholder="يوم">
        </div>
        <div class="secret-hint">••• سرٌّ لا يعرفه إلا من تحب •••</div>
        <button class="glitch-btn" id="enterBtn">فتح البوابة</button>
        <div style="margin-top: 20px; color:#a55; font-size:0.9rem;">dark web ● 0x3F3A</div>
    </div>
</div>

<!-- صفحة ساره الاحتفالية -->
<div class="main-party" id="partyScreen">
    <div class="bubble-bg" id="bubbleContainer"></div>
    <div class="flower-bg" id="flowerContainer"></div>

    <div class="box-container">
        <div class="gift-box" id="giftBox">
            <span>???</span>
        </div>
        <div class="hole-button" id="breakBtn">💥 اضغط لكسر الصندوق 💥</div>
    </div>

    <div class="sarah-name" id="sarahText">ســـاره</div>
    <div class="footer-love" id="loveNote">لأغلى صديقة 💗</div>
</div>

<script>
    (function() {
        // عناصر الدخول
        const loginScreen = document.getElementById('loginScreen');
        const partyScreen = document.getElementById('partyScreen');
        const enterBtn = document.getElementById('enterBtn');
        const yearInput = document.getElementById('year');
        const monthInput = document.getElementById('month');
        const dayInput = document.getElementById('day');

        // عناصر الصندوق والاسم
        const giftBox = document.getElementById('giftBox');
        const breakBtn = document.getElementById('breakBtn');
        const sarahText = document.getElementById('sarahText');
        const bubbleContainer = document.getElementById('bubbleContainer');
        const flowerContainer = document.getElementById('flowerContainer');

        let isBroken = false;

        // 1. التحقق من التاريخ السري (2009/4/15)
        enterBtn.addEventListener('click', function() {
            let y = yearInput.value.trim();
            let m = monthInput.value.trim();
            let d = dayInput.value.trim();

            // التاريخ السري: 2009 - 4 - 15
            if (y === '2009' && m === '4' && d === '15') {
                // دخول صحيح
                loginScreen.style.opacity = '0';
                setTimeout(() => {
                    loginScreen.style.display = 'none';
                    partyScreen.style.display = 'flex';
                    generateBubbles(30);
                    generateFlowers(25);
                }, 800);
            } else {
                alert('⛔ خطأ في التاريخ... البوابة مغلقة.');
                // تأثير ارتجاج
                loginScreen.style.transform = 'scale(1.02)';
                setTimeout(() => loginScreen.style.transform = 'scale(1)', 200);
                
                // مسح الحقول خطأ (اختياري لإرباك المتطفلين)
                yearInput.value = '';
                monthInput.value = '';
                dayInput.value = '';
            }
        });

        // 2. توليد الفقاعات والورود
        function generateBubbles(count) {
            for (let i = 0; i < count; i++) {
                let bubble = document.createElement('div');
                bubble.classList.add('bubble');
                let size = Math.floor(Math.random() * 100 + 30);
                bubble.style.width = size + 'px';
                bubble.style.height = size + 'px';
                bubble.style.left = Math.random() * 100 + '%';
                bubble.style.bottom = '-20%';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubble.style.animationDuration = Math.floor(Math.random() * 8 + 6) + 's';
                bubble.style.background = `rgba(255, ${Math.floor(Math.random()*100+120)}, ${Math.floor(Math.random()*100+130)}, 0.4)`;
                bubbleContainer.appendChild(bubble);
            }
        }

        function generateFlowers(count) {
            const flowers = ['🌸', '🌹', '🌺', '🌷', '🌸', '🌸', '🌼', '🌻', '💮', '🏵️', '🌸'];
            for (let i = 0; i < count; i++) {
                let flower = document.createElement('div');
                flower.classList.add('flower');
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.top = Math.random() * 100 + '%';
                flower.style.fontSize = (Math.random() * 40 + 25) + 'px';
                flower.style.animationDelay = Math.random() * 8 + 's';
                flower.style.animationDuration = (Math.random() * 20 + 10) + 's';
                flowerContainer.appendChild(flower);
            }
        }

        // 3. كسر الصندوق
        function blowBox() {
            if (isBroken) return;
            isBroken = true;

            giftBox.style.transition = 'all 0.5s';
            giftBox.style.transform = 'scale(1.2) rotate(3deg)';
            giftBox.style.background = 'radial-gradient(circle, #ff99aa, #ff3b6f)';
            giftBox.style.boxShadow = '0 0 0 10px #ffe5ec, 0 0 70px #ffb6c1, 0 30px 0 #8f1e3f';
            giftBox.innerHTML = '<span style="font-size:5rem;">🎁 ✨</span>';

            // أشرطة ملونة
            for (let i = 0; i < 100; i++) {
                createConfetti();
            }

            // فقاعات اضافية
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    let extraBubble = document.createElement('div');
                    extraBubble.classList.add('bubble');
                    let sz = Math.random() * 70 + 30;
                    extraBubble.style.width = sz + 'px';
                    extraBubble.style.height = sz + 'px';
                    extraBubble.style.left = Math.random() * 100 + '%';
                    extraBubble.style.animation = 'floatUp 5s ease-out';
                    extraBubble.style.background = `rgba(255, 180, 200, 0.8)`;
                    bubbleContainer.appendChild(extraBubble);
                }, i * 20);
            }

            // اسم ساره يظهر
            sarahText.classList.add('show');

            // ورد اضافي
            for (let f = 0; f < 30; f++) {
                let fl = document.createElement('div');
                fl.classList.add('flower');
                fl.innerHTML = '🌸';
                fl.style.left = Math.random() * 100 + '%';
                fl.style.top = Math.random() * 100 + '%';
                fl.style.fontSize = (Math.random() * 50 + 25) + 'px';
                fl.style.animation = 'spinFlower 10s infinite alternate';
                flowerContainer.appendChild(fl);
            }

            breakBtn.innerText = '🎉 صندوق ساره 🎉';
            breakBtn.style.background = '#ffecf0';
            breakBtn.style.pointerEvents = 'none';
            breakBtn.style.opacity = '0.9';
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti-piece');
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
            confetti.style.width = Math.random() * 20 + 8 + 'px';
            confetti.style.height = Math.random() * 30 + 15 + 'px';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 6000);
        }

        // أحداث الكسر
        breakBtn.addEventListener('click', blowBox);
        giftBox.addEventListener('click', blowBox);

        // ضغط إنتر في أي حقل
        yearInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enterBtn.click(); });
        monthInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enterBtn.click(); });
        dayInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') enterBtn.click(); });
    })();
</script>

<style>
    @media (max-width: 480px) {
        .login-card { width: 90%; padding: 1.5rem; }
        .date-inputs input { width: 60px; font-size: 1.3rem; }
        .gift-box { width: 220px; height: 220px; }
        .gift-box span { font-size: 1.5rem; }
        .hole-button { font-size: 1.4rem; padding: 15px 20px; }
    }
    
    .sarah-name.show {
        font-size: 15vw;
        line-height: 1.2;
        letter-spacing: 8px;
        filter: drop-shadow(0 0 40px #ff80a5);
        animation: heartbeat 1s infinite alternate;
    }
    
    @keyframes heartbeat {
        from { transform: scale(0.98); text-shadow: 0 0 30px #ff80a0; }
        to { transform: scale(1.05); text-shadow: 0 0 80px #ff3b6f, 0 0 120px red; }
    }
    
    .bubble-bg, .flower-bg { z-index: 0; }
    .box-container, .footer-love { z-index: 20; position: relative; }
    body { background: #120b0b; }
</style>
</body>
</html>
